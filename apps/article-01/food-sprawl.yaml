apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-sprawl
  labels:
    app: food-sprawl
    article: "01"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-sprawl
  template:
    metadata:
      labels:
        app: food-sprawl
    spec:
      containers:
        - name: hello
          image: us-docker.pkg.dev/google-samples/containers/gke/hello-app:2.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: food-sprawl
  labels:
    app: food-sprawl
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: NodePort
  selector:
    app: food-sprawl
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: food-sprawl-cert
spec:
  domains:
    - food-sprawl.cfg-lab.computingforgeeks.com
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-sprawl
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "food-sprawl-ip"
    networking.gke.io/managed-certificates: "food-sprawl-cert"
    kubernetes.io/ingress.allow-http: "false"
spec:
  defaultBackend:
    service:
      name: food-sprawl
      port:
        number: 80
