apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-web
  namespace: cfg-demo
spec:
  parentRefs:
  - name: cfg-lab-gw
  hostnames:
  - admin-gw.cfg-lab.computingforgeeks.com
  rules:
  - backendRefs:
    - name: admin-web
      port: 80
